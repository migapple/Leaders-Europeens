<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Leaders Européens</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0a0810;
    --ink2: #13101e;
    --gold: #c9a84c;
    --gold2: #e8c97a;
    --cream: #f0e8d0;
    --cream2: #d8ceb0;
    --muted: #6a6080;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--ink);
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
    height: 100vh;
    height: 100dvh;
  }

  #app {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    padding-top: var(--safe-top);
    background: var(--ink);
  }

  /* ── HEADER ── */
  header {
    flex-shrink: 0;
    padding: 14px 18px 10px;
    border-bottom: 1px solid rgba(201,168,76,0.25);
    background: var(--ink);
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .app-title {
    font-family: 'IM Fell English', serif;
    font-size: 1.25rem;
    color: var(--gold2);
    line-height: 1.1;
    letter-spacing: 0.01em;
  }

  .app-subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .lang-toggle {
    display: flex;
    border: 1px solid rgba(201,168,76,0.4);
    border-radius: 4px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .lang-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    padding: 5px 10px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .lang-btn.active {
    background: rgba(201,168,76,0.18);
    color: var(--gold2);
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid rgba(201,168,76,0.15);
  }

  .tab {
    flex: 1;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'IM Fell English', serif;
    font-size: 0.82rem;
    letter-spacing: 0.04em;
    padding: 9px 4px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.25s;
    position: relative;
    top: 1px;
  }

  .tab.active {
    color: var(--gold2);
    border-bottom-color: var(--gold);
  }

  /* ── FILTERS ── */
  .filters-wrap {
    flex-shrink: 0;
    padding: 8px 14px;
    border-bottom: 1px solid rgba(201,168,76,0.12);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }

  .filters-wrap::-webkit-scrollbar { display: none; }

  .filters {
    display: flex;
    gap: 7px;
    width: max-content;
  }

  .filter-btn {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 20px;
    color: var(--cream2);
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.75rem;
    letter-spacing: 0.04em;
    padding: 4px 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .filter-btn.active {
    background: rgba(201,168,76,0.2);
    border-color: var(--gold);
    color: var(--gold2);
  }

  /* ── LISTE ── */
  #tab-liste {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 10px 14px 20px;
    scrollbar-width: none;
  }

  #tab-liste::-webkit-scrollbar { display: none; }

  .leader-card {
    display: flex;
    align-items: center;
    gap: 13px;
    padding: 11px 12px;
    margin-bottom: 7px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(201,168,76,0.12);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .leader-card:active { background: rgba(201,168,76,0.08); }

  .leader-portrait {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 1.5px solid rgba(201,168,76,0.3);
    object-fit: cover;
    background: var(--ink2);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    overflow: hidden;
  }

  .leader-portrait img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }

  .leader-info { flex: 1; min-width: 0; }

  .leader-name {
    font-family: 'IM Fell English', serif;
    font-size: 0.97rem;
    color: var(--cream);
    line-height: 1.2;
  }

  .leader-role {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .leader-dates {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.73rem;
    color: rgba(201,168,76,0.7);
    margin-top: 1px;
  }

  .leader-flag {
    font-size: 1.4rem;
    flex-shrink: 0;
  }

  /* ── DETAIL ── */
  #panel-detail {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--ink);
    z-index: 100;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
    padding-top: var(--safe-top);
  }

  #panel-detail.open { transform: translateX(0); }

  .detail-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px 12px;
    border-bottom: 1px solid rgba(201,168,76,0.2);
    flex-shrink: 0;
  }

  .back-btn {
    background: none;
    border: none;
    color: var(--gold);
    font-size: 1.4rem;
    cursor: pointer;
    padding: 4px 8px 4px 0;
    line-height: 1;
  }

  .detail-scroll {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 0 0 40px;
    scrollbar-width: none;
  }

  .detail-scroll::-webkit-scrollbar { display: none; }

  .detail-portrait-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 20px 18px;
    border-bottom: 1px solid rgba(201,168,76,0.12);
    background: linear-gradient(180deg, rgba(201,168,76,0.04) 0%, transparent 100%);
  }

  .detail-portrait {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 2px solid rgba(201,168,76,0.4);
    object-fit: cover;
    background: var(--ink2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    overflow: hidden;
    margin-bottom: 14px;
  }

  .detail-portrait img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }

  .detail-flag { font-size: 2rem; margin-bottom: 4px; }

  .detail-name {
    font-family: 'IM Fell English', serif;
    font-size: 1.45rem;
    color: var(--gold2);
    text-align: center;
    line-height: 1.2;
  }

  .detail-role-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.88rem;
    color: var(--muted);
    text-align: center;
    margin-top: 4px;
  }

  .detail-dates-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.82rem;
    color: rgba(201,168,76,0.8);
    text-align: center;
    margin-top: 3px;
    letter-spacing: 0.04em;
  }

  .detail-body { padding: 18px 20px; }

  .detail-section {
    margin-bottom: 18px;
  }

  .detail-section-title {
    font-family: 'IM Fell English', serif;
    font-size: 0.78rem;
    color: var(--gold);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-bottom: 1px solid rgba(201,168,76,0.2);
    padding-bottom: 5px;
    margin-bottom: 9px;
  }

  .detail-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.95rem;
    color: var(--cream2);
    line-height: 1.65;
  }

  .detail-badge {
    display: inline-block;
    background: rgba(201,168,76,0.12);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 4px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.75rem;
    color: var(--gold2);
    padding: 3px 10px;
    margin: 3px 3px 0 0;
  }

  /* ── QUIZ ── */
  #tab-quiz {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px 16px 30px;
    scrollbar-width: none;
  }

  #tab-quiz::-webkit-scrollbar { display: none; }

  .quiz-score-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    background: rgba(201,168,76,0.06);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 8px;
    margin-bottom: 16px;
  }

  .quiz-score-label {
    font-family: 'IM Fell English', serif;
    font-size: 0.82rem;
    color: var(--muted);
  }

  .quiz-score-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    color: var(--gold2);
    font-weight: 600;
  }

  .quiz-question-box {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(201,168,76,0.18);
    border-radius: 10px;
    padding: 20px 16px;
    margin-bottom: 14px;
    text-align: center;
  }

  .quiz-q-portrait {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 2px solid rgba(201,168,76,0.35);
    margin: 0 auto 12px;
    background: var(--ink2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    overflow: hidden;
  }

  .quiz-q-portrait img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }

  .quiz-question-text {
    font-family: 'IM Fell English', serif;
    font-size: 1rem;
    color: var(--cream);
    line-height: 1.4;
  }

  .quiz-answers {
    display: flex;
    flex-direction: column;
    gap: 9px;
    margin-bottom: 16px;
  }

  .quiz-answer-btn {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 8px;
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.92rem;
    padding: 12px 16px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    line-height: 1.3;
  }

  .quiz-answer-btn.correct {
    background: rgba(80,180,80,0.15);
    border-color: rgba(80,200,80,0.5);
    color: #90e890;
  }

  .quiz-answer-btn.wrong {
    background: rgba(200,60,60,0.15);
    border-color: rgba(220,80,80,0.5);
    color: #e88080;
  }

  .quiz-answer-btn:disabled { cursor: default; }

  .quiz-next-btn {
    width: 100%;
    background: rgba(201,168,76,0.14);
    border: 1px solid rgba(201,168,76,0.4);
    border-radius: 8px;
    color: var(--gold2);
    font-family: 'IM Fell English', serif;
    font-size: 0.95rem;
    letter-spacing: 0.03em;
    padding: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .quiz-next-btn:active { background: rgba(201,168,76,0.25); }

  .quiz-result-box {
    text-align: center;
    padding: 30px 20px;
  }

  .quiz-result-score {
    font-family: 'IM Fell English', serif;
    font-size: 3rem;
    color: var(--gold2);
  }

  .quiz-result-label {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1rem;
    color: var(--muted);
    margin-top: 6px;
  }

  .quiz-restart-btn {
    margin-top: 20px;
    background: rgba(201,168,76,0.14);
    border: 1px solid rgba(201,168,76,0.4);
    border-radius: 8px;
    color: var(--gold2);
    font-family: 'IM Fell English', serif;
    font-size: 0.95rem;
    padding: 13px 30px;
    cursor: pointer;
  }

  /* ── HIDDEN ── */
  .hidden { display: none !important; }

  /* Loading spinner */
  .portrait-loading {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.6rem;
    color: var(--muted);
  }

  /* ── NOS APPS ── */
  #tab-apps {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px 16px 40px;
    scrollbar-width: none;
  }
  #tab-apps::-webkit-scrollbar { display: none; }

  .apps-intro {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.82rem;
    color: var(--muted);
    text-align: center;
    margin-bottom: 16px;
    letter-spacing: 0.04em;
  }

  .app-item {
    display: flex;
    align-items: center;
    gap: 13px;
    padding: 11px 13px;
    margin-bottom: 8px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(201,168,76,0.14);
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s;
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
  }

  .app-item:active { background: rgba(201,168,76,0.1); }

  .app-icon {
    width: 52px;
    height: 52px;
    border-radius: 12px;
    background: var(--ink2);
    border: 1px solid rgba(201,168,76,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    flex-shrink: 0;
    overflow: hidden;
  }

  .app-icon img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 12px;
  }

  .app-info { flex: 1; min-width: 0; }

  .app-name {
    font-family: 'IM Fell English', serif;
    font-size: 0.92rem;
    color: var(--cream);
    line-height: 1.2;
  }

  .app-desc {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .app-chevron {
    color: rgba(201,168,76,0.4);
    font-size: 1rem;
    flex-shrink: 0;
  }

</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header>
    <div class="header-top">
      <div>
        <div class="app-title" id="h-title">Leaders Européens</div>
        <div class="app-subtitle" id="h-subtitle">XXe Siècle · 42 figures</div>
      </div>
      <div class="lang-toggle">
        <button class="lang-btn active" onclick="setLang('fr')">FR</button>
        <button class="lang-btn" onclick="setLang('en')">EN</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" id="tab-btn-liste" onclick="showTab('liste')">
        <span id="t-liste">Figures</span>
      </button>
      <button class="tab" id="tab-btn-quiz" onclick="showTab('quiz')">Quiz</button>
      <button class="tab" id="tab-btn-apps" onclick="showTab('apps')" id="t-apps">Nos Apps</button>
    </div>
  </header>

  <!-- FILTERS -->
  <div class="filters-wrap" id="filters-wrap">
    <div class="filters" id="filters-container"></div>
  </div>

  <!-- LISTE -->
  <div id="tab-liste"></div>

  <!-- QUIZ -->
  <div id="tab-quiz" class="hidden"></div>

  <!-- NOS APPS -->
  <div id="tab-apps" class="hidden"></div>

  <!-- DETAIL PANEL -->
  <div id="panel-detail">
    <div class="detail-header">
      <button class="back-btn" onclick="closeDetail()">‹</button>
      <span id="detail-header-name" style="font-family:'IM Fell English',serif;font-size:1rem;color:var(--gold2)"></span>
    </div>
    <div class="detail-scroll">
      <div class="detail-portrait-wrap">
        <div class="detail-flag" id="detail-flag"></div>
        <div class="detail-portrait" id="detail-portrait-big"></div>
        <div class="detail-name" id="detail-name"></div>
        <div class="detail-role-text" id="detail-role"></div>
        <div class="detail-dates-text" id="detail-dates"></div>
      </div>
      <div class="detail-body">
        <div class="detail-section">
          <div class="detail-section-title" id="ds-bio">Biographie</div>
          <div class="detail-text" id="detail-bio"></div>
        </div>
        <div class="detail-section">
          <div class="detail-section-title" id="ds-legacy">Héritage</div>
          <div class="detail-text" id="detail-legacy"></div>
        </div>
        <div class="detail-section">
          <div class="detail-section-title" id="ds-tags">Catégories</div>
          <div id="detail-tags"></div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>

const mainCountries = ['France','Royaume-Uni','Allemagne','Italie','Espagne','Russie / URSS'];

function getFilteredData() {
  if (activeFilter === 'Tous' || activeFilter === 'All') return DATA;
  const t = T[lang];
  const idx = t.filters.indexOf(activeFilter);
  if (idx <= 0) return DATA;
  const key = t.filterKeys[idx];
  if (key === 'AUTRE') return DATA.filter(l => !mainCountries.includes(l.country));
  return DATA.filter(l => l.country === key);
}

function renderFilters() {
  const t = T[lang];
  const container = document.getElementById('filters-container');
  container.innerHTML = '';
  t.filters.forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (f === activeFilter ? ' active' : '');
    btn.textContent = f;
    btn.onclick = () => {
      activeFilter = f;
      renderFilters();
      renderListe();
    };
    container.appendChild(btn);
  });
}

}

// ────────────────────────────────────────────────
// PORTRAIT LOADER (Wikipedia — double stratégie)
// ────────────────────────────────────────────────
function loadPortrait(leader, container, size) {
  if (portraitCache[leader.id]) {
    applyPortrait(container, portraitCache[leader.id]);
    return;
  }
  container.textContent = leader.flag;

  // Stratégie 1 : REST v1 summary (thumbnail direct)
  const restUrl = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(leader.wiki)}`;
  fetch(restUrl, { headers: { 'Accept': 'application/json' } })
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(data => {
      const url = data.thumbnail?.source;
      if (url) { cacheAndShow(leader.id, url, container); }
      else { fallbackPageImages(leader, container, size); }
    })
    .catch(() => fallbackPageImages(leader, container, size));
}

// Stratégie 2 : action=query&prop=pageimages (piwikis, plus large)
function fallbackPageImages(leader, container, size) {
  const pxSize = size >= 100 ? 300 : 100;
  const url = `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(leader.wiki)}&prop=pageimages&pithumbsize=${pxSize}&format=json&origin=*`;
  fetch(url)
    .then(r => r.json())
    .then(data => {
      const pages = data.query?.pages;
      if (!pages) return;
      const page = Object.values(pages)[0];
      const imgUrl = page?.thumbnail?.source;
      if (imgUrl) cacheAndShow(leader.id, imgUrl, container);
    })
    .catch(() => {});
}

function cacheAndShow(id, url, container) {
  portraitCache[id] = url;
  applyPortrait(container, url);
}

function applyPortrait(container, url) {
  const img = new Image();
  img.onload = () => {
    container.innerHTML = '';
    img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:50%';
    container.appendChild(img);
  };
  img.onerror = () => {}; // garde le flag emoji
  img.src = url;
}

function initQuiz() {
  quizQuestions = buildQuizQuestions();
  quizIndex = 0;
  quizScore = 0;
  quizAnswered = false;
  renderQuiz();
}

function buildQuizQuestions() {
  const shuffled = [...DATA].sort(() => Math.random() - 0.5).slice(0, 10);
  return shuffled.map(leader => {
    const qTypeIdx = Math.floor(Math.random() * 4);
    let question, correctAnswer, wrongAnswers;

    if (qTypeIdx === 0) {
      // Nationality
      question = T[lang].qTypes[0](leader);
      correctAnswer = lang === 'fr' ? leader.country : leader.countryEn;
      wrongAnswers = DATA.filter(l => l.id !== leader.id)
        .sort(() => Math.random() - 0.5).slice(0,3)
        .map(l => lang === 'fr' ? l.country : l.countryEn);
    } else if (qTypeIdx === 1) {
      // Period
      question = T[lang].qTypes[1](leader);
      correctAnswer = leader.period;
      const fakePeriods = ['1910–1925','1930–1940','1950–1960','1970–1985','1945–1952','1960–1969'];
      wrongAnswers = fakePeriods.filter(p => p !== leader.period).sort(() => Math.random()-0.5).slice(0,3);
    } else if (qTypeIdx === 2) {
      // Role
      question = T[lang].qTypes[2](leader);
      correctAnswer = leader.role[lang];
      wrongAnswers = DATA.filter(l => l.id !== leader.id)
        .sort(() => Math.random()-0.5).slice(0,3)
        .map(l => l.role[lang]);
    } else {
      // Who is this? (with portrait)
      question = T[lang].qTypes[4](leader);
      correctAnswer = leader.name;
      wrongAnswers = DATA.filter(l => l.id !== leader.id)
        .sort(() => Math.random()-0.5).slice(0,3)
        .map(l => l.name);
    }

    // Deduplicate & shuffle answers
    const uniqueWrong = [...new Set(wrongAnswers)].filter(w => w !== correctAnswer).slice(0,3);
    while (uniqueWrong.length < 3) uniqueWrong.push('—');
    const answers = [...uniqueWrong, correctAnswer].sort(() => Math.random()-0.5);

    return { leader, question, correctAnswer, answers, qTypeIdx };
  });
}

function renderQuiz() {
  const container = document.getElementById('tab-quiz');
  container.innerHTML = '';

  const t = T[lang];

  // Score bar
  const scoreBar = document.createElement('div');
  scoreBar.className = 'quiz-score-bar';
  scoreBar.innerHTML = `
    <span class="quiz-score-label">${t.score}</span>
    <span class="quiz-score-value">${quizScore} / ${quizQuestions.length}</span>
  `;
  container.appendChild(scoreBar);

  if (quizIndex >= quizQuestions.length) {
    // Result
    const resultBox = document.createElement('div');
    resultBox.className = 'quiz-result-box';
    const pct = Math.round(quizScore / quizQuestions.length * 100);
    const emoji = pct >= 80 ? '🏆' : pct >= 50 ? '👍' : '📚';
    resultBox.innerHTML = `
      <div class="quiz-result-score">${emoji} ${quizScore}/${quizQuestions.length}</div>
      <div class="quiz-result-label">${t.quizDone}</div>
      <button class="quiz-restart-btn" onclick="initQuiz()">${t.restart}</button>
    `;
    container.appendChild(resultBox);
    return;
  }

  const q = quizQuestions[quizIndex];

  // Question box
  const qBox = document.createElement('div');
  qBox.className = 'quiz-question-box';

  const portraitEl = document.createElement('div');
  portraitEl.className = 'quiz-q-portrait';
  portraitEl.dataset.lid = q.leader.id;
  portraitEl.textContent = q.leader.flag;
  loadPortrait(q.leader, portraitEl, 80);
  qBox.appendChild(portraitEl);

  const qText = document.createElement('div');
  qText.className = 'quiz-question-text';
  qText.textContent = q.question;
  qBox.appendChild(qText);
  container.appendChild(qBox);

  // Answers
  const answersEl = document.createElement('div');
  answersEl.className = 'quiz-answers';
  q.answers.forEach(answer => {
    const btn = document.createElement('button');
    btn.className = 'quiz-answer-btn';
    btn.textContent = answer;
    btn.onclick = () => {
      if (quizAnswered) return;
      quizAnswered = true;
      const correct = answer === q.correctAnswer;
      if (correct) { quizScore++; btn.classList.add('correct'); }
      else { btn.classList.add('wrong'); }
      // Show correct answer
      answersEl.querySelectorAll('.quiz-answer-btn').forEach(b => {
        if (b.textContent === q.correctAnswer) b.classList.add('correct');
        b.disabled = true;
      });
      // Update score
      scoreBar.querySelector('.quiz-score-value').textContent = `${quizScore} / ${quizQuestions.length}`;
      nextBtn.style.display = 'block';
    };
    answersEl.appendChild(btn);
  });
  container.appendChild(answersEl);

  // Next button
  const nextBtn = document.createElement('button');
  nextBtn.className = 'quiz-next-btn';
  nextBtn.textContent = quizIndex < quizQuestions.length - 1 ? t.nextQ : t.restart;
  nextBtn.style.display = 'none';
  nextBtn.onclick = () => {
    quizIndex++;
    quizAnswered = false;
    if (quizIndex >= quizQuestions.length) renderQuiz();
    else { renderQuiz(); }
  };
  container.appendChild(nextBtn);
}

function renderApps() {
  const container = document.getElementById('tab-apps');
  container.innerHTML = '';

  const intro = document.createElement('div');
  intro.className = 'apps-intro';
  intro.textContent = lang === 'fr' ? 'Nos autres applications' : 'Our other applications';
  container.appendChild(intro);

  MES_APPS.forEach(app => {
    const item = document.createElement('div');
    item.className = 'app-item';
    item.onclick = () => {
      const url = 'https://apps.apple.com/app/' + app.id;
      window.open(url, '_system');
    };

    const iconEl = document.createElement('div');
    iconEl.className = 'app-icon';
    // Tenter de charger l'icône depuis iTunes API
    const itunes = `https://itunes.apple.com/lookup?id=${app.id.replace('id','')}&country=fr`;
    fetch(itunes)
      .then(r => r.json())
      .then(d => {
        const artwork = d.results && d.results[0] && d.results[0].artworkUrl100;
        if (artwork) {
          const img = document.createElement('img');
          img.src = artwork;
          iconEl.innerHTML = '';
          iconEl.appendChild(img);
        }
      })
      .catch(() => {});
    iconEl.textContent = app.icon;

    const infoEl = document.createElement('div');
    infoEl.className = 'app-info';
    infoEl.innerHTML = `
      <div class="app-name">${app.name}</div>
      <div class="app-desc">${app.desc[lang]}</div>
    `;

    const chevron = document.createElement('div');
    chevron.className = 'app-chevron';
    chevron.textContent = '›';

    item.appendChild(iconEl);
    item.appendChild(infoEl);
    item.appendChild(chevron);
    container.appendChild(item);
  });
}

// Préchargement arrière-plan de tous les portraits
function preloadAllPortraits() {
  DATA.forEach((leader, i) => {
    setTimeout(() => {
      if (portraitCache[leader.id]) return;
      const restUrl = 'https://en.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(leader.wiki);
      fetch(restUrl, { headers: { 'Accept': 'application/json' } })
        .then(r => r.ok ? r.json() : Promise.reject())
        .then(data => {
          const url = data.thumbnail && data.thumbnail.source;
          if (url) { portraitCache[leader.id] = url; refreshPortraitContainers(leader.id, url); }
          else { fallbackPageImages(leader, null, 120); }
        })
        .catch(() => { fallbackPageImages(leader, null, 120); });
    }, i * 150);
  });
}

function refreshPortraitContainers(id, url) {
  document.querySelectorAll('[data-lid="' + id + '"]').forEach(el => applyPortrait(el, url));
}

setTimeout(preloadAllPortraits, 400);
